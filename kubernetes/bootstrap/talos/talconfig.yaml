      - deviceSelector:
          hardwareAddr: "58:47:ca:78:f1:35"
        ignore: true
      - deviceSelector:
          hardwareAddr: "58:47:ca:78:f1:32"
        dhcp: false
        addresses:
          - "192.168.10.52/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.10.1"
        mtu: 1500
        vip:
          ip: "192.168.10.254"
    extensionServices:
      - name: nut-client
        configFiles:
          - content: |-
              MONITOR ups@192.168.10.23 1 upsmon_local mypassword secondary
