  - hostname: "ms3"
    ipAddress: "192.168.10.53"
    installDiskSelector:
      serial: "22061X806789"
    talosImageURL: factory.talos.dev/installer/743d942690991fb5b20d07e54b6d33c60b19d7918e14d61173d79e718ebc0b47
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:78:f8:4c"
        ignore: true
        # Intel VPRO
      - deviceSelector:
          hardwareAddr: "58:47:ca:78:f8:4d"
        ignore: true
