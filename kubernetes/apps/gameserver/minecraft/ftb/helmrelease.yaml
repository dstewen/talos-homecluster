---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft-ftb
  namespace: gameserver
spec:
  interval: 30m
  chart:
    spec:
      # renovate: registryUrl=https://itzg.github.io/minecraft-server-charts/
      chart: minecraft
      version: 4.23.1
      sourceRef:
        kind: HelmRepository
        name: itzg
        namespace: flux-system
      interval: 15m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - amd64
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 50
          preference:
            matchExpressions:
            - key: node-role.kubernetes.io/worker
              operator: In
              values:
              - worker
    resources:
      requests:
        memory: 4G
      limits:
        memory: 10G
    securityContext:
      runAsUser: 1000
      fsGroup: 2000
#    serviceAnnotations:
#      io.cilium/lb-ipam-ips: 192.168.10.230
#      mc-router.itzg.me/externalServerName: "mcsv.${SECRET_DOMAIN}"
    livenessProbe:
      command:
        - mc-health
      initialDelaySeconds: 120
      periodSeconds: 10
    readinessProbe:
      command:
        - mc-health
      initialDelaySeconds: 120
      periodSeconds: 10
    startupProbe:
      command:
        - mc-health
      enabled: true
      failureThreshold: 60
      periodSeconds: 10
    image:
      repository: itzg/minecraft-server
      tag: java17
    minecraftServer:
      eula: "TRUE"
      version: "1.20.1"
      type: "FTBA"
      forceReDownload: true
      ftbModpackId: "119"
      ftbModpackVersionId: "11614"
      difficulty: normal
      whitelist: "dneck77"
      ops: "dneck77"
      gameMode: survival
      pvp: false
      onlineMode: false
      jvmXXOpts: "-XX:MaxRAMPercentage=75"
      memory: 8192M
      serviceType: LoadBalancer
      loadBalancerIP: "192.168.10.230"
#      servicePort: 25565
      motd: "TurtleTest FTB:R"
      externalTrafficPolicy: Cluster
      allowNether: true
      worldSaveName: TurtleTest
      viewDistance: 12
      overrideServerProperties: true
#      extraPorts:
#      - name: metrics
#        containerPort: 9225
#        protocol: TCP
#        service:
#          enabled: true
#          embedded: false
#          type: ClusterIP
#          port: 9225
#        ingress:
#          enabled: false
#      - name: map
#        containerPort: 8123
#        protocol: TCP
#        service:
#          enabled: true
#          embedded: false
#          type: ClusterIP
#          port: 8123
#        ingress:
#          ingressClassName: internal
#          enabled: true
#          hosts:
#          - name: &host "mc.${SECRET_DOMAIN}"
#            path: /
#          tls:
#          - secretName: *host
#            hosts:
#            - *host
    persistence:
#      storageClass: local-hostpath
      dataDir:
        enabled: true
        existingClaim: minecraft-ftb-data-v1
    extraEnv:
      # recommended rolling logs for saving disk
      ENABLE_ROLLING_LOGS: true
      ENABLE_WHITELIST: true
      ENFORCE_WHITELIST: true
      FORCE_WORLD_COPY: false
#      DEBUG: true
#      DEBUG_EXEC: true
#      DEBUG_MEMORY: true
