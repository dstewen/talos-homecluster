---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: localai-data
  namespace: ai
  labels:
    app.kubernetes.io/name: &name localai
    app.kubernetes.io/instance: *name
    snapshot.home.arpa/enabled: "true"
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-block
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: localai-pipelines
  namespace: ai
  labels:
    app.kubernetes.io/name: &name localai
    app.kubernetes.io/instance: *name
    snapshot.home.arpa/enabled: "true"
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-block
  resources:
    requests:
      storage: 2Gi
